services:
  app:
    image: ghcr.io/06leong/trainmap:0.1
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000

      # Change this password together with postgres.environment.POSTGRES_PASSWORD.
      DATABASE_URL: postgres://trainmap:change-me@postgres:5432/trainmap

      # Playwright runs inside the app container and captures the internal Next.js render route.
      TRAINMAP_RENDER_BASE_URL: http://127.0.0.1:3000
      TRAINMAP_EXPORT_DIR: /app/storage/exports

      # Change this to your public trainmap domain behind Nginx Proxy Manager.
      NEXT_PUBLIC_APP_URL: https://trainmap.example.com

      # MapLibre-compatible style URLs. Replace with your own MapTiler/OpenMapTiles styles if needed.
      NEXT_PUBLIC_MAP_STYLE_LIGHT: https://tiles.openfreemap.org/styles/bright
      NEXT_PUBLIC_MAP_STYLE_DARK: https://tiles.openfreemap.org/styles/liberty

      # Optional: enable Swiss Open Data OJP 2.0 route refinement from trip detail pages.
      # Get a token from https://api-manager.opentransportdata.swiss after registering an app.
      # SWISS_OPEN_DATA_API_KEY: replace-with-token
      SWISS_OPEN_DATA_OJP_ENDPOINT: https://api.opentransportdata.swiss/ojp20
      SWISS_OPEN_DATA_REQUESTOR_REF: trainmap_prod
      SWISS_OPEN_DATA_USER_AGENT: trainmap/0.1
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Bind only to the Docker gateway address for Nginx Proxy Manager.
      # NPM upstream target: http://172.18.0.1:4396
      # Change 172.18.0.1 if your Docker gateway address is different.
      - "172.18.0.1:4396:3000"
    volumes:
      # Use a Docker-managed volume instead of a host bind mount.
      # This avoids host filesystem permission issues for the non-root app user.
      - trainmap_exports:/app/storage/exports

  postgres:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: trainmap
      POSTGRES_USER: trainmap

      # Change this password together with app.environment.DATABASE_URL.
      POSTGRES_PASSWORD: change-me
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

      # These SQL files run only when ./data/postgres is initialized for the first time.
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trainmap -d trainmap"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  trainmap_exports:
    name: trainmap_exports
